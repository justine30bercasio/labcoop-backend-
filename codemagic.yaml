workflows:
  android-release:
    name: Android Release APK
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: 3.44.1
      xcode: latest
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: master
          include: true
          source: true
    scripts:
      - flutter pub get
      - flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/*.apk

  ios-release:
    name: iOS Release IPA
    instance_type: mac_mini_m2
    max_build_duration: 90
    environment:
      flutter: 3.44.1
      xcode: latest
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: master
          include: true
          source: true
    scripts:
      - flutter pub get
      - rm -rf ~/Library/Developer/Xcode/DerivedData/Runner-*
      - flutter build ios --release --no-codesign || true
      - ruby -e 'p=File.read("ios/Podfile");fix="\n  installer.pods_project.build_configurations.each do |config|\n    config.build_settings[\"CLANG_ALLOW_NON_MODULAR_INCLUDES_IN_FRAMEWORK_MODULES\"] = \"YES\"\n  end";p.gsub!("flutter_additional_ios_build_settings(target)","flutter_additional_ios_build_settings(target)"+fix);File.write("ios/Podfile",p)'
      - echo 'CLANG_ALLOW_NON_MODULAR_INCLUDES_IN_FRAMEWORK_MODULES=YES' >> ios/Flutter/Release.xcconfig
      - rm -rf ios/Podfile.lock ios/Pods
      - cd ios && pod install && cd ..
      - flutter build ios --release --no-codesign
      - mkdir -p Payload
      - cp -r build/ios/iphoneos/Runner.app Payload/
      - zip -r app.ipa Payload/
    artifacts:
      - app.ipa
