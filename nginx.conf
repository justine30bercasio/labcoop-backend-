worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
  multi_accept on;
  use epoll;
}

http {
  ## MIME types
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  ## Logging
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';
  access_log /var/log/nginx/access.log main buffer=16k;

  ## Gzip compression
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_min_length 256;
  gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/json
    application/javascript
    application/xml
    application/xml+rss
    application/vnd.ms-excel
    application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
    image/svg+xml;

  ## Rate limiting
  limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
  limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
  limit_req_status 429;

  ## Timeouts
  client_body_timeout 60s;
  client_header_timeout 30s;
  send_timeout 30s;
  keepalive_timeout 75s;
  keepalive_requests 500;

  ## Buffers
  client_max_body_size 100M;
  client_body_buffer_size 128k;
  large_client_header_buffers 4 16k;

  ## SSL
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers on;
  ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 10m;
  ssl_session_tickets off;
  ssl_stapling on;
  ssl_stapling_verify on;

  ## Security headers
  add_header X-Frame-Options DENY always;
  add_header X-Content-Type-Options nosniff always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' https://*.render.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
  proxy_hide_header X-Powered-By;
  proxy_hide_header Server;

  ## Upstream
  upstream backend {
    server 127.0.0.1:3000;
    keepalive 64;
  }

  ## HTTP → HTTPS redirect (uncomment when SSL is configured)
  # server {
  #   listen 80;
  #   server_name labcoop.example.com;
  #   return 301 https://$server_name$request_uri;
  # }

  ## HTTPS server (uncomment and configure when SSL certs are available)
  server {
    listen 80 default_server;
    # listen 443 ssl http2 default_server;
    server_name labcoop.example.com;

    ## SSL certificate paths (replace with actual paths)
    # ssl_certificate /etc/nginx/ssl/fullchain.pem;
    # ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    # ssl_trusted_certificate /etc/nginx/ssl/chain.pem;

    ## Root location — proxy to Node
    location / {
      proxy_pass http://backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_buffering off;
      proxy_read_timeout 90s;

      limit_req zone=api burst=50 nodelay;
    }

    ## Public uploads — shop border/avatar images & board of directors photos
    ## (no auth needed; all other /uploads/ paths go through Node auth middleware)
    location /uploads/shop/ {
      alias /app/uploads/shop/;
      expires 7d;
      add_header Cache-Control "public, immutable";
      add_header X-Content-Type-Options nosniff;
      access_log off;
    }
    location /uploads/board/ {
      alias /app/uploads/board/;
      expires 7d;
      add_header Cache-Control "public, immutable";
      add_header X-Content-Type-Options nosniff;
      access_log off;
    }

    ## Everything else under /uploads/ (KYC, profiles, registration docs) is
    ## proxied to Node which enforces authentication — no direct nginx serving
    location /uploads/ {
      proxy_pass http://backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_buffering off;
    }

    ## Health check (no rate limit)
    location /api/health {
      proxy_pass http://backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      access_log off;
    }

    ## Deny .env / .git / node_modules
    location ~* \.(env|git|md|log)$ {
      deny all;
      return 404;
    }
    location ~* /node_modules/ {
      deny all;
      return 404;
    }

    ## Error pages
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
      root /usr/share/nginx/html;
    }
  }
}
