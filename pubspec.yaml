name: labcoop
description: Gamified Cooperative Passbook for children
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.0.0
  dio: ^5.4.0
  lottie: ^3.0.0
  json_annotation: ^4.8.1
  get_it: ^7.6.4
  intl: ^0.19.0
  connectivity_plus: ^5.0.2
  path_provider: ^2.1.1
  crypto: ^3.0.3
  image_picker: ^1.2.0
  vector_math: ^2.1.4
  url_launcher: ^6.2.6
  flutter_inappwebview: ^6.1.5
  http: ^1.2.1
  device_preview: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  hive_generator: ^2.0.1
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/animations/

    - assets/icons/
    - assets/images/
    - assets/images/coincatcher.png
